<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scripts Hub // Dhruv</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
    
    <style>
        :root {
            /* Dark Theme Defaults */
            --bg: #000000;
            --surface: #111111;
            --border: #333333;
            --text-main: #ededed;
            --text-muted: #888888;
            --brand-blue: #ffffff; /* White in dark mode for high contrast */
            --title-shadow: rgba(255, 255, 255, 0.1);
        }

        body.light-theme {
            /* Light Theme Overrides */
            --bg: #ffffff;
            --surface: #fafafa;
            --border: #eaeaea;
            --text-main: #171717;
            --text-muted: #666666;
            --brand-blue: #1976d2; /* Exact Brand Blue from main page */
            --title-shadow: rgba(25, 118, 210, 0.2);
            --button-blue: #1976d2;
        }

        html { scrollbar-gutter: stable; }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 40px 10% 80px 10%;
            transition: background 0.3s ease;
        }

        /* --- Header Section --- */
        header {
            border-bottom: 1px solid var(--border);
            padding-bottom: 24px;
            margin-top: -10px;
            margin-bottom: 60px;
            text-align: center;
        }

        h1 { 
            font-family: 'Inter', sans-serif; 
            font-size: 2.8rem; 
            margin: 0; 
            font-weight: 700; 
            color: var(--brand-blue);
            letter-spacing: -0.5px;
            text-shadow: 0 2px 10px var(--title-shadow);
            transition: all 0.5s ease;
        }

        .subtitle {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-muted);
            margin-top: 12px;
            text-transform: uppercase;
            letter-spacing: 4px; 
            opacity: 0.7;
        }

        /* --- Scripts Grid Container (Currently Empty) --- */
        .scripts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 30px;
        }

        /* --- Theme Toggle Button --- */
        .theme-toggle {
            position: fixed; 
            top: 30px; 
            right: 30px;
            background: var(--surface); 
            border: 1px solid var(--border);
            color: var(--text-main); 
            padding: 10px; 
            cursor: pointer;
            border-radius: 50%;
            z-index: 100;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .theme-toggle:hover {
            border-color: var(--brand-blue);
            box-shadow: 0 0 10px var(--title-shadow);
        }

        @media (max-width: 768px) {
            body { padding: 40px 5% 80px 5%; }
            h1 { font-size: 2.2rem; }
            .subtitle { font-size: 0.7rem; letter-spacing: 2px; }
        }

        .card-desc {
    color: #1976d2; /* The exact blue we chose */
    font-weight: 500;
    font-size: 0.9rem;
    margin-top: 8px;
}

.content-drawer {
    display: none; /* Hidden by default */
    padding-top: 20px;
    margin-top: 20px;
    border-top: 1px solid var(--border);
}

.script-card.active .content-drawer {
    display: block;
}

.meta-group {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
    margin-bottom: 20px;
}

.meta-item h4 {
    font-size: 0.7rem;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 5px;
}

.meta-item p {
    font-size: 0.85rem;
}

.btn {
    background: var(--text-main);
    color: var(--bg);
    border: none;
    padding: 12px;
    width: 100%;
    font-weight: 700;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.3s ease;
}
    </style>
</head>
<body class="light-theme"> <button class="theme-toggle" onclick="document.body.classList.toggle('light-theme')" aria-label="Toggle Theme">
        <i class="ri-contrast-2-line"></i>
    </button>

    <header>
        <h1>Scripts Hub</h1>
        <div class="subtitle">System Automation & Logic Archive // v1.1.0</div>
    </header>

    <main>
        <div class="scripts-grid" id="scripts-container">
            </div>
    </main>

    <script>
        const CONTAINER = document.getElementById('scripts-container');

async function addScriptCard(filePath) {
    try {
        const response = await fetch(filePath);
        const text = await response.text();

        // Part 1: Split Metadata from Code
        const [metaSection, codeSection] = text.split('---');
        
        // Part 2: Parse Metadata into an object
        const meta = {};
        metaSection.trim().split('\n').forEach(line => {
            const [key, ...value] = line.split(': ');
            meta[key.trim()] = value.join(': ').trim();
        });

        // Part 3: Create the HTML Structure
        const card = document.createElement('div');
        card.className = 'script-card';
        card.onclick = function() { this.classList.toggle('active'); };

        card.innerHTML = `
            <div class="card-header">
                <div>
                    <h2>${meta.TITLE}</h2>
                    <span class="tag">${meta.TAG}</span>
                </div>
            </div>
            <p class="card-desc">${meta.DESC}</p>

            <div class="content-drawer" onclick="event.stopPropagation()">
                <div class="meta-group">
                    <div class="meta-item">
                        <h4>Requirements</h4>
                        <p>${meta.REQS}</p>
                    </div>
                    <div class="meta-item">
                        <h4>Operation</h4>
                        <p>${meta.OPER}</p>
                    </div>
                </div>
                
                <button class="btn" onclick="copyCode(this, \`${codeSection.trim()}\`)">
                    Copy Source Code
                </button>

                <div class="protocol-box">
                    <h4>Execution Protocol</h4>
                    <p style="font-size: 0.85rem; color: var(--text-muted); line-height: 1.4;">
                        ${meta.PROT}
                    </p>
                </div>
            </div>
        `;

        CONTAINER.appendChild(card);
    } catch (err) {
        console.error("Error loading script:", filePath, err);
    }
}

// Universal Copy Function
function copyCode(btn, code) {
    navigator.clipboard.writeText(code);
    const originalText = btn.innerText;
    btn.innerText = "COPIED TO CLIPBOARD!";
    btn.style.background = "#1976d2";
    btn.style.color = "#ffffff";
    
    setTimeout(() => {
        btn.innerText = originalText;
        btn.style.background = "var(--accent)";
        btn.style.color = "var(--bg)";
    }, 2000);
}
addScriptCard('/static/scripts/vocal_greeting.txt');
    </script>
</body>
</html>
