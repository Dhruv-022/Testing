<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fortress Activated!</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: radial-gradient(circle at top left, #0f172a, #1e293b 60%, #0f172a);
      overflow: hidden;
    }

    /* Decorative blurred circles */
    body::before, body::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.05);
      filter: blur(120px);
    }
    body::before {
      width: 400px;
      height: 400px;
      top: -100px;
      left: -100px;
    }
    body::after {
      width: 500px;
      height: 500px;
      bottom: -150px;
      right: -150px;
    }

    .card {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.25);
      padding: 2rem;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      color: #f1f5f9;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    h2 {
      margin-top: 0;
      font-weight: 700;
      font-size: 2rem;
      color: #22c55e; /* success green */
      text-shadow: 0 0 12px rgba(34, 197, 94, 0.8);
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 500;
      color: #f8fafc;
      margin: 1rem 0;
    }

    p {
      color: #cbd5e1;
      font-size: 0.95rem;
      margin-bottom: 1.5rem;
    }

    button {
      padding: 0.75rem 1.5rem;
      border-radius: 12px;
      border: none;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: #fff;
      transition: transform 0.2s ease, background 0.3s ease;
      box-shadow: 0 4px 12px rgba(34, 197, 94, 0.4);
    }

    button:hover {
      background: linear-gradient(135deg, #16a34a, #15803d);
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>Success!</h2>
    <h1>{{ first_name }}, your account is successfully created.</h1>
    <p>Your identity row parameters are now active in the database system registry logs.</p>
    <button onclick="window.location.href='/'">Go to Dashboard</button>
  </div>
</body>
</html>
