<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Identity Fortress - Step 3</title>
</head>
<body>
    <h2>🔑 Account Activation - Step 3</h2>
    <p>Your email has been successfully verified! Set your secure password below to activate your system account.</p>
    <hr>
    
    <form method="POST">
        {% csrf_token %}
        <p>
            <label>Choose Account Password:</label><br>
            <input type="password" name="password" required minlength="8" placeholder="Enter a strong password">
        </p>
        <button type="submit">Activate Account</button>
    </form>
</body>
</html>
