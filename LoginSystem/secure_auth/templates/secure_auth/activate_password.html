<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Identity Fortress - Step 3</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: radial-gradient(circle at top left, #0f172a, #1e293b 60%, #0f172a);
      overflow: hidden;
    }

    /* Decorative blurred circles */
    body::before, body::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.05);
      filter: blur(120px);
    }
    body::before {
      width: 400px;
      height: 400px;
      top: -100px;
      left: -100px;
    }
    body::after {
      width: 500px;
      height: 500px;
      bottom: -150px;
      right: -150px;
    }

    .card {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.25);
      padding: 2rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      color: #f1f5f9;
      position: relative;
      z-index: 1;
      text-align: center;
    }

    h2 {
      margin-top: 0;
      font-weight: 600;
      font-size: 1.5rem;
      color: #f8fafc;
    }

    p {
      color: #cbd5e1;
      font-size: 0.9rem;
      margin-bottom: 1rem;
    }

    label {
      font-size: 0.85rem;
      color: #e2e8f0;
      margin-bottom: 0.25rem;
      display: block;
      text-align: left;
    }

    input {
      display: block;
      margin: 0 auto 1rem auto; /* centers the box */
      width: 80%; /* same width as button */
      padding: 0.9rem;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.25);
      background: rgba(255, 255, 255, 0.12);
      color: #f8fafc;
      font-size: 1rem;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: inset 0 2px 6px rgba(255, 255, 255, 0.1),
                  0 2px 6px rgba(0, 0, 0, 0.3);
      transition: all 0.3s ease;
    }

    input::placeholder {
      color: #94a3b8;
    }

    input:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 12px rgba(59, 130, 246, 0.6),
                  inset 0 2px 6px rgba(255, 255, 255, 0.15);
      background: rgba(255, 255, 255, 0.18);
    }

    button {
      display: block;
      margin: 0 auto;
      width: 80%; /* matches input width */
      padding: 0.75rem;
      border-radius: 12px;
      border: none;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: #fff;
      transition: transform 0.2s ease, background 0.3s ease;
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.4);
    }

    button:hover {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      transform: translateY(-2px);
    }

    hr {
      border: 0;
      border-top: 1px solid rgba(255, 255, 255, 0.2);
      margin: 1.5rem 0;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>Account Activation - Step 3</h2>
    <p>Your email has been successfully verified! Set your secure password below to activate your system account.</p>
    <hr>
    <form method="POST">
      {% csrf_token %}
      <label>Choose Account Password:</label>
      <input type="password" name="password" required minlength="8" placeholder="Enter a strong password">
      <button type="submit">Activate Account</button>
    </form>
  </div>
</body>
</html>
