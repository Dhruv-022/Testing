<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verification - Step 2</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: radial-gradient(circle at top left, #0f172a, #1e293b 60%, #0f172a);
      overflow: hidden;
    }

    /* Decorative blurred circles */
    body::before, body::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.05);
      filter: blur(120px);
    }
    body::before {
      width: 400px;
      height: 400px;
      top: -100px;
      left: -100px;
    }
    body::after {
      width: 500px;
      height: 500px;
      bottom: -150px;
      right: -150px;
    }

    .card {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.25);
      padding: 2rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      color: #f1f5f9;
      position: relative;
      z-index: 1;
      text-align: center; /* ensures children align centrally */
    }

    h2 {
      margin-top: 0;
      font-weight: 600;
      font-size: 1.5rem;
      color: #f8fafc;
    }

    p {
      color: #cbd5e1;
      font-size: 0.9rem;
      margin-bottom: 1rem;
    }

    /* Combined timer box & resend anchor styles */
    .timer-box {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 0.5rem;
      border-radius: 10px;
      text-align: center;
      font-size: 0.85rem;
      color: #cbd5e1;
      margin-bottom: 0.5rem;
    }

    #countdown {
      font-weight: 700;
      color: #3b82f6;
      margin-left: 0.25rem;
    }

    #resend-link {
      color: #cbd5e1;
      text-decoration: none;
      font-weight: 500;
      transition: all 0.2s ease;
    }

    .resend-accent {
      color: #3b82f6;
      font-weight: 700;
      text-decoration: underline;
    }

    #resend-link:hover .resend-accent {
      color: #60a5fa;
    }

    label {
      font-size: 0.85rem;
      color: #e2e8f0;
      margin-bottom: 0.25rem;
      display: block;
      text-align: left; /* keep label aligned left */
    }

    input {
      display: block;
      margin: 0 auto 1rem auto; /* centers the box itself */
      padding: 0.9rem;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.25);
      background: rgba(255, 255, 255, 0.12);
      color: #f8fafc;
      font-size: 1.25rem;
      text-align: center;
      letter-spacing: 0.25rem;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: inset 0 2px 6px rgba(255, 255, 255, 0.1),
                  0 2px 6px rgba(0, 0, 0, 0.3);
      transition: all 0.3s ease;
      width: 80%; /* narrower width so it looks balanced */
    }

    input::placeholder {
      color: #94a3b8;
    }

    input:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 12px rgba(59, 130, 246, 0.6),
                  inset 0 2px 6px rgba(255, 255, 255, 0.15);
      background: rgba(255, 255, 255, 0.18);
    }

    button {
      width: 80%; /* same width as input for symmetry */
      margin: 0 auto;
      padding: 0.75rem;
      border-radius: 12px;
      border: none;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: #fff;
      transition: transform 0.2s ease, background 0.3s ease, opacity 0.2s ease;
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.4);
      display: block;
    }

    button:hover:not(:disabled) {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      transform: translateY(-2px);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      box-shadow: none;
    }

    hr {
      border: 0;
      border-top: 1px solid rgba(255, 255, 255, 0.2);
      margin: 1.5rem 0;
    }

    .error-alert {
      background: rgba(220, 38, 38, 0.15);
      color: #fca5a5;
      border: 1px solid rgba(220, 38, 38, 0.4);
      padding: 0.75rem;
      border-radius: 8px;
      margin-bottom: 1rem;
      font-size: 0.9rem;
      text-align: center;
      backdrop-filter: blur(8px);
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>Email Verification</h2>
    <p>Step 2 of 3: Enter the security code sent to your inbox.</p>
    
    <!-- Updated Timer / Resend UI Box Container -->
    <div class="timer-box">
      <span id="timer-text-container">
        Code expires in: <span id="countdown">05:00</span>
      </span>
      <a href="{% url 'resend_otp' %}" id="resend-link" style="display: none;">
        Didn't receive code? <span class="resend-accent">Resend OTP</span>
      </a>
    </div>
    
    <hr>
    <form method="POST">
      {% csrf_token %}
      <label>6-Digit OTP Code</label>
      <input type="text" name="otp" required autocomplete="off" maxlength="6" placeholder="000000">

      {% if error_message %}
        <div class="error-alert">{{ error_message }}</div>
      {% endif %}

      <button type="submit">Verify Code</button>
    </form>
  </div>

  <script>
  let totalSeconds = parseInt("{{ time_left }}") || 0;
  const countdownDisplay = document.getElementById("countdown");
  const timerTextContainer = document.getElementById("timer-text-container");
  const resendLink = document.getElementById("resend-link");
  const submitButton = document.querySelector("button[type='submit']");
  const inputField = document.querySelector("input[name='otp']");

  function updateTimerDisplay() {
    if (totalSeconds <= 0) {
      // 🌟 Clean State Swap on Expiration
      timerTextContainer.style.display = "none";
      resendLink.style.display = "inline-block";
      
      // Visual Form Lockdowns
      if (submitButton) submitButton.disabled = true;
      if (inputField) inputField.disabled = true;
      return;
    }

    let minutes = Math.floor(totalSeconds / 60);
    let seconds = totalSeconds % 60;

    let formattedMinutes = minutes < 10 ? "0" + minutes : minutes;
    let formattedSeconds = seconds < 10 ? "0" + seconds : seconds;

    countdownDisplay.innerHTML = `${formattedMinutes}:${formattedSeconds}`;
    totalSeconds--;
  }

  // Initialize view structure calculations instantly
  updateTimerDisplay();

  const timerInterval = setInterval(() => {
    if (totalSeconds <= 0) {
      clearInterval(timerInterval);
    }
    updateTimerDisplay();
  }, 1000);
</script>
</body>
</html>
