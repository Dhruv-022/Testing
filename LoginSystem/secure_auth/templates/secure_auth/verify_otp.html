<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Identity Fortress - Step 2</title>
</head>
<body>
    <h2>🛡️ Email Verification - Step 2</h2>
    <p>Please check your inbox. We have fired a 6-digit verification code across the network.</p>
    <hr>
    
    <form method="POST">
        {% csrf_token %}
        <p>
            <label>Enter 6-Digit OTP Code:</label><br>
            <input type="text" name="otp" required autocomplete="off" maxlength="6" placeholder="X X X X X X">
        </p>
        
        {% if error_message %}
            <p style="color: red; font-weight: bold;">{{ error_message }}</p>
        {% endif %}
        
        <button type="submit">Verify Code</button>
    </form>
</body>
</html>
