<!DOCTYPE html>
<html>
<body>

    <h2>📝 Automate URL Parameters</h2>
    
    <form method="GET" action="/test-gate/">
        <label>Type Name:</label>
        <input type="text" name="name">
        <br><br>
        <button type="submit">Generate URL Parameters</button>
    </form>

    {% if display_name %}
        <h3>🎯 Extracted From Your URL Bar:</h3>
        <p>Name variable: {{ display_name }}</p>
    {% endif %}

</body>
</html>
