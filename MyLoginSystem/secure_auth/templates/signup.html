<!DOCTYPE html>
<html>
<head>
    <title>Identity Fortress - Signup</title>
</head>
<body style="font-family: Arial, sans-serif; padding: 50px; text-align: center; background-color: #f4f6f7;">

    <div style="background: white; padding: 30px; border-radius: 8px; max-width: 400px; margin: 0 auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
        <h2>🏰 Create Account</h2>
        <p style="color: #7f8c8d;">Step 1: Account Details</p>
        
        <form method="POST" action="">
            {% csrf_token %}
            
            {{ form_blueprint.as_p }}
            
            <br>
            <button type="submit" style="padding: 10px 20px; background-color: #2c3e50; color: white; border: none; border-radius: 4px; cursor: pointer; width: 100%; font-weight: bold;">
                Send Verification OTP
            </button>
        </form>
    </div>

</body>
</html>
