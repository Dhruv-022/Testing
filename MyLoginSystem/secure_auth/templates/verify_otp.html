<!DOCTYPE html>
<html>
<head>
    <title>Identity Fortress - Verify OTP</title>
</head>
<body style="font-family: Arial, sans-serif; padding: 50px; text-align: center; background-color: #f4f6f7;">

    <div style="background: white; padding: 30px; border-radius: 8px; max-width: 400px; margin: 0 auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
        <h2>🔑 Confirm Your Identity</h2>
        <p style="color: #7f8c8d;">Step 2: Check your terminal console for the 6-digit code.</p>
        
        <form method="POST" action="">
            {% csrf_token %}


            {% if error_container %}
            <p style="color: #e74c3c; font-weight: bold; background: #fadbd8; padding: 10px; border-radius: 4px;">
                {{ error_container }}
            </p>
            {% endif %}
            
            {{ form_blueprint.as_p }}
            
            <br>
            <button type="submit" style="padding: 10px 20px; background-color: #27ae60; color: white; border: none; border-radius: 4px; cursor: pointer; width: 100%; font-weight: bold;">
                Verify & Activate Account
            </button>
        </form>
    </div>

</body>
</html>
